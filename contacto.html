    <h1>Contacto - Formulario</h1>
    <p>Por favor complete el siguiente formulario:</p>
    
<form method="get" action="gracias.html">
    <p><strong>Nombre:</strong>
        <input type="text" name="nombre" required placeholder="Nombre y Apellido" ></p>

    <p><strong>Email:</strong> 
        <input type="email" name="email" required placeholder="email"></p>

    <p><strong>Contraseña:</strong>
        <input type="password" name="clave" placeholder="clave"></p>

    <p>Experiencia:<br>
        <input type="checkbox" name="experiencia" value="Dis">Diseño<br>
        <input type="checkbox" name="experiencia" value="Com">Comunicación<br>
        <input type="checkbox" name="experiencia" value="Des">Desarrollo<br>
        <input type="checkbox" name="experiencia" value="Neg">Negocios<br>
    </p>

    <p>Estudia actualmente: <input type="radio" name="estudio" value="si"> SI | NO  <input type="radio" name="estudio" value="no"> </p>

    <p><strong>País:</strong>
        <select name="pais">
            <option>seleccione país</option>
            <option value="ARG">Argentina</option>
            <option value="BRA">Brasil</option>
            <option value="COL">Colombia</option>
            <option value="ECU">Ecuador</option>
        </select>
    </p>

    <p><strong>Mensaje / consulta:<br></strong> 
        <textarea name="consulta" placeholder="Mensaje / consulta"></textarea>
    </p>
    <p> <input type="submit" name="btnenvio" value="Enviar formulario" class="botonenvio"></p>
</form>
